<style>
/* ── Reset & base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* UCSC official brand colors */
  --ucsc-navy: #003C6C;
  --ucsc-navy-dark: #002b4d;
  --ucsc-navy-light: #1a5688;
  --ucsc-gold: #FDC700;

  --topbar-h: 60px;
  --sidebar-w: 230px;

  --color-bg: #f5f7fa;
  --color-surface: #ffffff;
  --color-border: #e2e6ec;
  --color-text: #1f2733;
  --color-muted: #66707d;
  --color-danger: #c0392b;
  --color-success: #1e8449;
  --color-warning: #c87f0a;

  --radius: 8px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-pop: 0 4px 16px rgba(0,0,0,0.12);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --transition: 0.18s ease;
}

body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Top header bar ──────────────────────────────────────── */
#topbar {
  height: var(--topbar-h);
  background: var(--ucsc-navy);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
#nav-toggle {
  background: none; border: none; color: #fff; cursor: pointer;
  font-size: 22px; padding: 4px; display: flex; align-items: center;
  border-radius: 4px; transition: background var(--transition);
}
#nav-toggle:hover { background: rgba(255,255,255,0.12); }
.topbar-title { font-size: 19px; font-weight: 700; letter-spacing: 0.2px; }
.topbar-right { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.9); }
.topbar-right .ti { font-size: 18px; }
.topbar-user { white-space: nowrap; }

/* Gold accent strip under header (subtle UCSC nod) */
#topbar::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: 0;
  height: 3px; background: var(--ucsc-gold);
}

/* ── Layout: sidebar + content ───────────────────────────── */
#layout {
  display: flex;
  min-height: calc(100vh - var(--topbar-h));
}

#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  padding: 14px 0;
  transition: margin-left var(--transition);
  flex-shrink: 0;
}
#sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-w)); }

.nav-list { list-style: none; }
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 20px;
  color: var(--color-text);
  text-decoration: none;
  font-size: 14px;
  border-left: 3px solid transparent;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
.nav-item .ti { font-size: 19px; flex-shrink: 0; color: var(--color-muted); transition: color var(--transition); }
.nav-item:hover { background: #eef2f7; }
.nav-item.active {
  background: #eaf0f6;
  color: var(--ucsc-navy);
  border-left-color: var(--ucsc-navy);
  font-weight: 600;
}
.nav-item.active .ti { color: var(--ucsc-navy); }

/* ── Content ─────────────────────────────────────────────── */
#content { flex: 1; overflow-x: hidden; padding: 28px 32px; }
#module-container { max-width: 1080px; margin: 0 auto; }

/* ── Cards ───────────────────────────────────────────────── */
.card {
  background: var(--color-surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 28px 32px;
  margin-bottom: 22px;
}
.card-title {
  font-size: 17px; font-weight: 700; color: var(--ucsc-navy);
  margin-bottom: 18px; display: flex; align-items: center; gap: 9px;
}
.card-title .ti { color: var(--ucsc-navy); font-size: 20px; }

.welcome-card { max-width: 1080px; }
.welcome-title { font-size: 20px; font-weight: 700; color: var(--ucsc-navy); margin-bottom: 6px; }
.quick-actions { display: flex; flex-wrap: wrap; gap: 12px; }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 6px; border: 1px solid transparent;
  font-size: 14px; font-weight: 500; cursor: pointer;
  font-family: var(--font); text-decoration: none;
  transition: background var(--transition), box-shadow var(--transition);
}
.btn-primary { background: var(--ucsc-navy); color: #fff; }
.btn-primary:hover { background: var(--ucsc-navy-dark); }
.btn-secondary { background: var(--color-surface); color: var(--color-text); border-color: var(--color-border); }
.btn-secondary:hover { background: var(--color-bg); }
.btn-gold { background: var(--ucsc-gold); color: var(--ucsc-navy); font-weight: 600; }
.btn-gold:hover { background: #e6b400; }
.btn-danger { background: var(--color-danger); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 12.5px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Forms ───────────────────────────────────────────────── */
.form-group { margin-bottom: 17px; }
.form-label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--color-text); }
.form-label .required { color: var(--color-danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--color-border); border-radius: 6px;
  font-size: 14px; font-family: var(--font);
  color: var(--color-text); background: var(--color-surface);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none; border-color: var(--ucsc-navy);
  box-shadow: 0 0 0 3px rgba(0,60,108,0.12);
}
.form-textarea { resize: vertical; min-height: 90px; }
.form-hint { font-size: 12px; color: var(--color-muted); margin-top: 4px; }
.form-error { font-size: 12px; color: var(--color-danger); margin-top: 4px; display: none; }
.form-error.visible { display: block; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-actions { display: flex; gap: 10px; margin-top: 22px; }

/* ── Tables ──────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.data-table th {
  text-align: left; padding: 11px 14px;
  border-bottom: 2px solid var(--color-border);
  color: var(--ucsc-navy); font-weight: 600; white-space: nowrap;
}
.data-table td { padding: 11px 14px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
.data-table tr:hover td { background: #f8fafc; }

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; padding: 2px 9px;
  border-radius: 100px; font-size: 11.5px; font-weight: 600;
}
.badge-success { background: #d5f0e0; color: #1e7a45; }
.badge-warning { background: #fdeecb; color: #9a6206; }
.badge-danger  { background: #fadddd; color: #a8302a; }
.badge-neutral { background: #e9edf2; color: #54606e; }
.badge-navy    { background: #dde8f2; color: var(--ucsc-navy); }
.badge-gold    { background: #fdf3cc; color: #8a6d00; }

/* ── Toast ───────────────────────────────────────────────── */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--color-surface);
  border: 1px solid var(--color-border); border-radius: var(--radius);
  box-shadow: var(--shadow-pop); font-size: 13.5px;
  min-width: 240px; max-width: 360px; animation: slideIn 0.2s ease;
}
.toast-success { border-left: 3px solid var(--color-success); }
.toast-error   { border-left: 3px solid var(--color-danger); }
.toast-info    { border-left: 3px solid var(--ucsc-navy); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── Loading / states ────────────────────────────────────── */
.module-loading { display: flex; align-items: center; gap: 10px; padding: 40px 0; color: var(--color-muted); }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 20px; height: 20px; border: 2px solid var(--color-border); border-top-color: var(--ucsc-navy); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
.empty-state { text-align: center; padding: 40px; color: var(--color-muted); }

/* ── Module tabs (shared by module UIs) ──────────────────── */
.module-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--color-border); margin-bottom: 0; }
.module-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px; border: none; background: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  font-size: 13.5px; color: var(--color-muted);
  font-family: var(--font); transition: color var(--transition); margin-bottom: -1px;
}
.module-tab.active { color: var(--ucsc-navy); border-bottom-color: var(--ucsc-navy); font-weight: 600; }
.module-tab:hover:not(.active) { color: var(--color-text); }

/* ── Utilities ───────────────────────────────────────────── */
.flex { display: flex; } .items-center { align-items: center; }
.between { justify-content: space-between; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
.mb-4 { margin-bottom: 16px; } .mt-2 { margin-top: 8px; }
.text-muted { color: var(--color-muted); } .text-sm { font-size: 12.5px; }

/* ── Responsive: sidebar overlays on narrow screens ──────── */
@media (max-width: 720px) {
  #sidebar { position: fixed; top: var(--topbar-h); bottom: 0; z-index: 150; box-shadow: var(--shadow-pop); }
  #sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-w)); }
  .topbar-user { display: none; }
  #content { padding: 20px 16px; }
  .card { padding: 22px 18px; }
}
/* ── Dashboard: task list + urgency badges ───────────────── */
.dashboard { display: flex; flex-direction: column; gap: 18px; max-width: 1080px; }
.task-list { list-style: none; margin: 0; padding: 0; }
.task-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border: 1px solid var(--color-border); border-radius: var(--radius);
  margin-bottom: 8px; cursor: pointer; background: var(--color-surface);
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
}
.task-item:last-child { margin-bottom: 0; }
.task-item:hover { border-color: var(--ucsc-navy); box-shadow: var(--shadow-pop); transform: translateX(2px); }
.task-item:focus { outline: 2px solid var(--ucsc-gold); outline-offset: 1px; }
/* Left accent stripe by urgency */
.task-item.urgency-overdue  { border-left: 3px solid var(--color-danger); }
.task-item.urgency-due_soon { border-left: 3px solid var(--color-warning); }
.task-item.urgency-stale    { border-left: 3px solid var(--color-muted); }
.task-item.urgency-normal   { border-left: 3px solid var(--color-border); }

.task-badge {
  display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0;
  font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
  white-space: nowrap;
}
.task-badge .ti { font-size: 13px; }
.badge-danger  { background: #fbeae8; color: var(--color-danger); }
.badge-warning { background: #fbf1e0; color: var(--color-warning); }
.badge-muted   { background: var(--color-bg); color: var(--color-muted); }
.badge-normal  { background: var(--color-bg); color: var(--color-muted); }

.task-label { flex: 1 1 auto; font-size: 14px; color: var(--color-text); min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-when { flex-shrink: 0; font-size: 12px; }
.task-chev { color: var(--color-muted); flex-shrink: 0; font-size: 16px; }

@media (max-width: 720px) {
  .task-when { display: none; }
  .task-item { flex-wrap: wrap; }
}
/* ── Admin roster: search / filter / sort controls ───────── */
.roster-controls {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  margin: 4px 0 14px;
}
.roster-controls .form-select { width: auto; min-width: 140px; }
.roster-search { position: relative; flex: 1 1 240px; min-width: 200px; }
.roster-search .ti {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--color-muted); font-size: 16px; pointer-events: none;
}
.roster-search .form-input { width: 100%; padding-left: 32px; }

@media (max-width: 720px) {
  .roster-controls .form-select { flex: 1 1 100%; width: 100%; }
  .roster-search { flex: 1 1 100%; }
}
</style>
