<script>
// ============================================================
// _Scripts.html — Client-side App framework (v2.1)
//
// v2.1: Navigation state now lives in the PARENT (address-bar) URL via
// google.script.history / google.script.url. Apps Script web apps run in
// a sandboxed iframe, so window.location inside the app is the iframe's
// URL — writing a hash there never reaches the address bar and never
// survives a browser refresh. The google.script pair is the supported
// bridge to the real URL. Side benefit: writing the hash with null params
// consumes any ?page=&focus= deep-link parameters after first use, so a
// deep link opens focused exactly once instead of replaying on every
// refresh.
// ============================================================

const App = (() => {

  let _state = { userEmail: '', userName: '', userRoles: [], activePage: '', modules: [], tasks: [], publicBaseUrl: '' };

  // Whether the parent URL carried a ?page= deep-link parameter this
  // session. Apps Script's history.replace() does not reliably remove
  // existing query params, so when this is true the shell always keeps an
  // explicit restore hash (even #dashboard) — the hash outranks the
  // lingering params at routing time, making them harmless.
  let _hadPageParam = false;

  function init(state) {
    Object.assign(_state, state);

    // All routing decisions need the PARENT (address-bar) URL — the
    // iframe's own window.location never survives a reload. getLocation is
    // async; until it answers the shell just shows the empty container for
    // a few dozen ms.
    try {
      google.script.url.getLocation(_route);
    } catch (e) {
      // google.script.url unavailable (shouldn't happen in IFRAME mode) —
      // route with no location rather than showing a blank page.
      _route(null);
    }
  }

  // Routing precedence:
  //   1. Restore hash (#module) — a hash means this session has already
  //      navigated past any deep link, so it OUTRANKS ?page=&focus=. This
  //      is what stops a lingering deep-link param from replaying on every
  //      refresh. '#dashboard' is a valid sentinel (see _setHash).
  //   2. Deep link — the server saw ?page= (and maybe &focus=) and passed
  //      them through as activePage / initialFocus. Open focused; once the
  //      module loads, _setHash() writes the hash so rule 1 takes over.
  //   3. Dashboard — the default view.
  function _route(loc) {
    _hadPageParam = !!(loc && loc.parameter && loc.parameter.page);
    const hashKey = ((loc && loc.hash) || '').trim();

    if (hashKey === 'dashboard') { goDashboard(); return; }
    if (hashKey && _moduleAllowed(hashKey)) { loadModule(hashKey, null); return; }

    if (_state.activePage && _state.activePage !== 'dashboard') {
      loadModule(_state.activePage, _state.initialFocus || null);
      return;
    }

    goDashboard();   // also clears a stale/forbidden hash via _setHash
  }

  // ── Dashboard ─────────────────────────────────────────────
  function goDashboard() {
    _setActiveNav('dashboard');
    _state.activePage = 'dashboard';
    _setHash('dashboard');   // dashboard is the default → clears hash + params
    window.__focus = null;   // clear any stale deep-link focus
    const greeting = _state.userName ? `Welcome, ${_esc(_state.userName)}` : 'Welcome';
    document.getElementById('module-container').innerHTML = `
      <div class="dashboard">
        <div class="card welcome-card">
          <h1 class="welcome-title">${greeting}</h1>
          <p class="text-muted" style="margin-bottom:0;">Here's what needs your attention.</p>
        </div>
        <div class="card" id="tasks-card">
          <div class="card-title" style="justify-content:space-between;">
            <span style="display:flex;align-items:center;gap:8px;">
              <i class="ti ti-checklist"></i> Needs your attention
            </span>
            <button class="btn btn-secondary btn-sm" onclick="App.refreshTasks()" title="Refresh">
              <i class="ti ti-refresh"></i>
            </button>
          </div>
          <div id="tasks-list"></div>
        </div>
      </div>`;
    _renderTasks();
  }

  function _renderTasks() {
    const el = document.getElementById('tasks-list');
    if (!el) return;
    const tasks = _state.tasks || [];
    if (!tasks.length) {
      el.innerHTML = `<div class="empty-state" style="padding:28px;">
        <i class="ti ti-circle-check" style="font-size:28px;color:var(--color-success);"></i>
        <p style="margin-top:8px;">You're all caught up — no tasks right now.</p>
      </div>`;
      return;
    }
    el.innerHTML = `<ul class="task-list">${tasks.map(_taskRow).join('')}</ul>`;
  }

  function _taskRow(t) {
    const u = _urgencyMeta(t.urgency);
    const when = _taskTiming(t);
    // Deep-link payload is passed by id lookup at click time (avoids quoting issues).
    return `<li class="task-item urgency-${_esc(t.urgency || 'normal')}"
                onclick="App.openTask('${_esc(t.taskId)}')" role="button" tabindex="0"
                onkeypress="if(event.key==='Enter'){App.openTask('${_esc(t.taskId)}')}">
      <span class="task-badge badge-${u.cls}" title="${u.label}">
        <i class="ti ${u.icon}"></i> ${u.label}
      </span>
      <span class="task-label">${_esc(t.label || '(untitled task)')}</span>
      <span class="task-when text-muted">${_esc(when)}</span>
      <i class="ti ti-chevron-right task-chev" aria-hidden="true"></i>
    </li>`;
  }

  function _urgencyMeta(urgency) {
    switch (urgency) {
      case 'overdue':  return { cls: 'danger',  icon: 'ti-alert-triangle', label: 'Overdue' };
      case 'due_soon': return { cls: 'warning', icon: 'ti-clock',          label: 'Due soon' };
      case 'stale':    return { cls: 'muted',   icon: 'ti-hourglass',      label: 'Needs follow-up' };
      default:         return { cls: 'normal',  icon: 'ti-point',          label: 'Open' };
    }
  }

  // Human-readable timing line: prefer a due date, else show age.
  function _taskTiming(t) {
    if (t.dueAt) {
      const due = new Date(t.dueAt);
      if (!isNaN(due.getTime())) {
        const days = Math.round((due.getTime() - Date.now()) / 86400000);
        if (days < 0)  return `due ${Math.abs(days)}d ago`;
        if (days === 0) return 'due today';
        return `due in ${days}d`;
      }
    }
    if (t.createdAt) {
      const created = new Date(t.createdAt);
      if (!isNaN(created.getTime())) {
        const days = Math.floor((Date.now() - created.getTime()) / 86400000);
        return days <= 0 ? 'opened today' : `opened ${days}d ago`;
      }
    }
    return '';
  }

  // Deep-link: open the owning module focused on the task's source record.
  function openTask(taskId) {
    const t = (_state.tasks || []).find(x => x.taskId === taskId);
    if (!t) return;
    if (!t.module) { Toast.show('This task has no linked module.', 'error'); return; }
    loadModule(t.module, { sourceType: t.sourceType, sourceId: t.sourceId, taskId: t.taskId });
  }

  // Refresh tasks in place (no full reload), via the shell-level endpoint.
  function refreshTasks() {
    google.script.run
      .withSuccessHandler(tasks => { _state.tasks = tasks || []; _renderTasks(); })
      .withFailureHandler(() => Toast.show('Could not refresh tasks.', 'error'))
      .getMyTasks();
  }

  // ── Module loader ─────────────────────────────────────────
  // focus (optional): { sourceType, sourceId, taskId } — a deep-link
  // request. It is set on window.__focus BEFORE the module's scripts run,
  // so a module that supports deep-linking can read it during its own
  // init and open/highlight that record. Modules that don't support focus
  // simply ignore window.__focus and open normally. The shell never needs
  // to know what any module does with it — that's the loose-coupling seam.
  function loadModule(moduleKey, focus) {
    _setActiveNav(moduleKey);
    const container = document.getElementById('module-container');
    container.innerHTML = '<div class="module-loading"><div class="spinner"></div><span>Loading…</span></div>';

    google.script.run
      .withSuccessHandler(html => {
        container.innerHTML = html;
        _state.activePage = moduleKey;
        _setHash(moduleKey);   // persist the view in the parent URL (and
                               // consume any deep-link ?page=&focus= params)
        // Publish the deep-link focus (or clear it) before scripts execute.
        window.__focus = focus || null;
        container.querySelectorAll('script').forEach(s => {
          const fresh = document.createElement('script');
          if (s.src) fresh.src = s.src; else fresh.textContent = s.textContent;
          document.head.appendChild(fresh).remove();
        });
        if (window.innerWidth <= 720) document.getElementById('sidebar').classList.add('collapsed');
      })
      .withFailureHandler(err => {
        container.innerHTML = `
          <div class="card">
            <div style="color:var(--color-danger);display:flex;align-items:center;gap:8px;">
              <i class="ti ti-alert-circle"></i><strong>Error loading module</strong>
            </div>
            <p style="margin-top:8px;color:var(--color-muted);font-size:13px;">${_esc(err.message)}</p>
          </div>`;
        Toast.show(err.message || 'Failed to load module', 'error');
      })
      .getModuleHTML(moduleKey);
  }

  // ── Server call helper ────────────────────────────────────
  function call(module, action, payload, onSuccess, onError) {
    google.script.run
      .withSuccessHandler(onSuccess)
      .withFailureHandler(err => {
        const msg = (err && err.message) || 'An error occurred.';
        Toast.show(msg, 'error');
        if (onError) onError(err);
      })
      .dispatch(module, action, payload);
  }

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

  function _setActiveNav(key) {
    document.querySelectorAll('.nav-item').forEach(a => a.classList.toggle('active', a.dataset.module === key));
  }

  // Persist the current view in the PARENT (address-bar) URL so a browser
  // refresh restores it — _route() reads it back via
  // google.script.url.getLocation(). window.location here would only touch
  // the sandboxed iframe's URL, which never reaches the address bar and
  // does not survive a reload.
  //
  // params is passed as {} in an attempt to scrub any ?page=&focus=
  // deep-link query string, but Apps Script has been observed to leave
  // existing params in place regardless. That's why the hash outranks the
  // params in _route(), and why — when a deep link started this session —
  // even the dashboard writes an explicit '#dashboard' sentinel instead of
  // a clean URL: a refresh must find SOME hash, or the lingering ?page=
  // would replay the deep link. replace (not push) keeps in-app navigation
  // out of the browser's back-button history.
  function _setHash(key) {
    let next = (key && key !== 'dashboard') ? key : '';
    if (!next && _hadPageParam) next = 'dashboard';
    try {
      google.script.history.replace(null, {}, next);
    } catch (e) {
      // history API unavailable — navigation still works, refresh-restore
      // just silently degrades to opening the dashboard.
    }
  }

  // Whether moduleKey is in the user's role-filtered, enabled module list
  // (the same list the sidebar is built from). Used to validate a restored
  // hash so an unknown/disabled/forbidden key silently falls through.
  function _moduleAllowed(key) {
    return (_state.modules || []).some(m => m.key === key);
  }

  // Current module/page key, read by modules to detect whether they are still
  // the live page before running deferred (async-callback) UI work.
  function currentPage() { return _state.activePage; }

  // Standardized deep-link card for a module's settings tab. Returns HTML
  // showing the module's form deep link (alias-based) with a copy button and
  // the roles that can use it. moduleKey is the page/registry key; opts.focus
  // defaults to 'form' (the standardized "open this module's form" token).
  function deepLinkCard(moduleKey, opts) {
    opts = opts || {};
    const base = _state.publicBaseUrl || '';
    if (!base) return '';
    const sep = base.indexOf('?') === -1 ? '?' : '&';
    const url = base + sep + 'page=' + encodeURIComponent(moduleKey)
              + '&focus=' + encodeURIComponent(opts.focus || 'form');
    const roleLine = (opts.roles && opts.roles.length)
      ? '<p class="text-sm text-muted" style="margin:8px 0 0;">Works for: ' + _esc(opts.roles.join(', ')) + '</p>'
      : '';
    const title = _esc(opts.title || 'Direct link to this form');
    const note = _esc(opts.note || 'Share this link to send people straight to the form. They will sign in first if needed.');
    return ''
      + '<div class="card" style="margin-top:20px;">'
      + '<div class="card-title"><i class="ti ti-link"></i> ' + title + '</div>'
      + '<p class="text-sm text-muted" style="margin-bottom:10px;">' + note + '</p>'
      + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">'
      + '<input class="form-input" id="dl-' + _esc(moduleKey) + '" readonly value="' + _esc(url) + '" '
      + 'style="flex:1 1 280px;font-family:monospace;font-size:12.5px;" onclick="this.select();">'
      + '<button class="btn btn-secondary btn-sm" onclick="App.copyDeepLink(\'' + _esc(moduleKey) + '\')">'
      + '<i class="ti ti-copy"></i> Copy</button>'
      + '</div>' + roleLine
      + '</div>';
  }

  // Copy a rendered deep-link field's value to the clipboard.
  function copyDeepLink(moduleKey) {
    const el = document.getElementById('dl-' + moduleKey);
    if (!el) return;
    el.select();
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(el.value).then(function () { Toast.show('Link copied.', 'success'); });
      } else {
        document.execCommand('copy');
        Toast.show('Link copied.', 'success');
      }
    } catch (e) { Toast.show('Press Ctrl/Cmd+C to copy.', 'info'); }
  }

  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { init, goDashboard, loadModule, call, toggleSidebar, openTask, refreshTasks, currentPage, deepLinkCard, copyDeepLink };

})();


// ============================================================
// Toast
// ============================================================
const Toast = (() => {
  function show(message, type, duration) {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    const icon = type === 'success' ? 'ti-circle-check' : type === 'error' ? 'ti-alert-circle' : 'ti-info-circle';
    el.className = `toast toast-${type || 'info'}`;
    el.innerHTML = `<i class="ti ${icon}" style="font-size:16px;flex-shrink:0"></i><span>${message}</span>`;
    container.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, duration || 3500);
  }
  return { show };
})();


// ============================================================
// FormHelper
// ============================================================
const FormHelper = (() => {
  function collect(containerId) {
    const container = document.getElementById(containerId);
    const inputs = container.querySelectorAll('[name]');
    const data = {}; let isValid = true;
    inputs.forEach(el => {
      const errEl = el.parentElement.querySelector('.form-error');
      if (errEl) errEl.classList.remove('visible');
      el.style.borderColor = '';
      const val = el.value.trim();
      if (el.hasAttribute('required') && !val) { _err(el, errEl, 'This field is required.'); isValid = false; }
      if (el.type === 'email' && val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { _err(el, errEl, 'Enter a valid email address.'); isValid = false; }
      data[el.name] = val;
    });
    return { data, isValid };
  }
  function reset(containerId) {
    document.getElementById(containerId).querySelectorAll('[name]').forEach(el => {
      el.value = '';
      const errEl = el.parentElement.querySelector('.form-error');
      if (errEl) errEl.classList.remove('visible');
    });
  }
  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId); if (!btn) return;
    if (btn.dataset.originalText === undefined) btn.dataset.originalText = btn.innerHTML;
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<i class="ti ti-loader-2" style="animation:spin 0.7s linear infinite"></i> ' + (label || 'Saving…')
      : btn.dataset.originalText;
  }
  function _err(el, errEl, msg) {
    el.style.borderColor = 'var(--color-danger)';
    if (errEl) { errEl.textContent = msg; errEl.classList.add('visible'); }
  }
  return { collect, reset, setLoading };
})();
</script>
